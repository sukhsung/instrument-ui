  <div id="numpad" class="numpad hidden">
    <div class="numpad-header">
      <div class="keyboard-buffer-inline">
        <div id="numpad_buffer_value" class="keyboard-buffer-inline-value"></div>
      </div>
      <button id="PB_numpad_close" class="numpad-close">✕</button>
    </div>
    <div class="numpad-grid">
      <button class="numpad-btn" data-key="7">7</button>
      <button class="numpad-btn" data-key="8">8</button>
      <button class="numpad-btn" data-key="9">9</button>
      <button class="numpad-btn numpad-action" data-action="backspace">
        <img data-instrument-asset="UI_icons/backspace.svg" class="mx-auto h-6 w-6" />
      </button>
      <button class="numpad-btn" data-key="4">4</button>
      <button class="numpad-btn" data-key="5">5</button>
      <button class="numpad-btn" data-key="6">6</button>
      <button class="numpad-btn numpad-action" data-action="negate">±</button>
      <button class="numpad-btn" data-key="1">1</button>
      <button class="numpad-btn" data-key="2">2</button>
      <button class="numpad-btn" data-key="3">3</button>
      <button class="numpad-btn" data-key=".">.</button>
      <button class="numpad-btn numpad-zero" data-key="0">0</button>
      <button class="numpad-btn numpad-action numpad-enter" data-action="enter">
        ↵
      </button>
    </div>
  </div>
