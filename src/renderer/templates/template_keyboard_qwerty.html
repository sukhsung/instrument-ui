
  <div id="qwerty" class="qwerty hidden">
    <div class="qwerty-header">
      <div class="keyboard-buffer-inline">
        <div id="qwerty_buffer_value" class="keyboard-buffer-inline-value"></div>
      </div>
      <button id="PB_qwerty_close" class="qwerty-close">✕</button>
    </div>

    <!-- Letters layer -->
    <div class="qwerty-layer" id="qwerty-letters">
      <div class="qwerty-row">
        <button class="qwerty-key" data-lower="q" data-upper="Q">
          <span class="ql">q</span><span class="qu">Q</span>
        </button>
        <button class="qwerty-key" data-lower="w" data-upper="W">
          <span class="ql">w</span><span class="qu">W</span>
        </button>
        <button class="qwerty-key" data-lower="e" data-upper="E">
          <span class="ql">e</span><span class="qu">E</span>
        </button>
        <button class="qwerty-key" data-lower="r" data-upper="R">
          <span class="ql">r</span><span class="qu">R</span>
        </button>
        <button class="qwerty-key" data-lower="t" data-upper="T">
          <span class="ql">t</span><span class="qu">T</span>
        </button>
        <button class="qwerty-key" data-lower="y" data-upper="Y">
          <span class="ql">y</span><span class="qu">Y</span>
        </button>
        <button class="qwerty-key" data-lower="u" data-upper="U">
          <span class="ql">u</span><span class="qu">U</span>
        </button>
        <button class="qwerty-key" data-lower="i" data-upper="I">
          <span class="ql">i</span><span class="qu">I</span>
        </button>
        <button class="qwerty-key" data-lower="o" data-upper="O">
          <span class="ql">o</span><span class="qu">O</span>
        </button>
        <button class="qwerty-key" data-lower="p" data-upper="P">
          <span class="ql">p</span><span class="qu">P</span>
        </button>
      </div>
      <div class="qwerty-row qwerty-row-center">
        <button class="qwerty-key" data-lower="a" data-upper="A">
          <span class="ql">a</span><span class="qu">A</span>
        </button>
        <button class="qwerty-key" data-lower="s" data-upper="S">
          <span class="ql">s</span><span class="qu">S</span>
        </button>
        <button class="qwerty-key" data-lower="d" data-upper="D">
          <span class="ql">d</span><span class="qu">D</span>
        </button>
        <button class="qwerty-key" data-lower="f" data-upper="F">
          <span class="ql">f</span><span class="qu">F</span>
        </button>
        <button class="qwerty-key" data-lower="g" data-upper="G">
          <span class="ql">g</span><span class="qu">G</span>
        </button>
        <button class="qwerty-key" data-lower="h" data-upper="H">
          <span class="ql">h</span><span class="qu">H</span>
        </button>
        <button class="qwerty-key" data-lower="j" data-upper="J">
          <span class="ql">j</span><span class="qu">J</span>
        </button>
        <button class="qwerty-key" data-lower="k" data-upper="K">
          <span class="ql">k</span><span class="qu">K</span>
        </button>
        <button class="qwerty-key" data-lower="l" data-upper="L">
          <span class="ql">l</span><span class="qu">L</span>
        </button>
      </div>
      <div class="qwerty-row">
        <button class="qwerty-wide qwerty-shift qwerty-action" data-action="shift">
          ⇧
        </button>
        <button class="qwerty-key" data-lower="z" data-upper="Z">
          <span class="ql">z</span><span class="qu">Z</span>
        </button>
        <button class="qwerty-key" data-lower="x" data-upper="X">
          <span class="ql">x</span><span class="qu">X</span>
        </button>
        <button class="qwerty-key" data-lower="c" data-upper="C">
          <span class="ql">c</span><span class="qu">C</span>
        </button>
        <button class="qwerty-key" data-lower="v" data-upper="V">
          <span class="ql">v</span><span class="qu">V</span>
        </button>
        <button class="qwerty-key" data-lower="b" data-upper="B">
          <span class="ql">b</span><span class="qu">B</span>
        </button>
        <button class="qwerty-key" data-lower="n" data-upper="N">
          <span class="ql">n</span><span class="qu">N</span>
        </button>
        <button class="qwerty-key" data-lower="m" data-upper="M">
          <span class="ql">m</span><span class="qu">M</span>
        </button>
        <button class="qwerty-wide qwerty-action" data-action="backspace">
          <img data-instrument-asset="UI_icons/backspace.svg" class="mx-auto h-6 w-6" />
        </button>
      </div>
    </div>

    <!-- Symbols layer -->
    <div class="qwerty-layer hidden" id="qwerty-symbols">
      <div class="qwerty-row">
        <button class="qwerty-key" data-lower="1">1</button>
        <button class="qwerty-key" data-lower="2">2</button>
        <button class="qwerty-key" data-lower="3">3</button>
        <button class="qwerty-key" data-lower="4">4</button>
        <button class="qwerty-key" data-lower="5">5</button>
        <button class="qwerty-key" data-lower="6">6</button>
        <button class="qwerty-key" data-lower="7">7</button>
        <button class="qwerty-key" data-lower="8">8</button>
        <button class="qwerty-key" data-lower="9">9</button>
        <button class="qwerty-key" data-lower="0">0</button>
      </div>
      <div class="qwerty-row">
        <button class="qwerty-key" data-lower="@">@</button>
        <button class="qwerty-key" data-lower="#">#</button>
        <button class="qwerty-key" data-lower="$">$</button>
        <button class="qwerty-key" data-lower="%">%</button>
        <button class="qwerty-key" data-lower="&amp;">&#38;</button>
        <button class="qwerty-key" data-lower="*">*</button>
        <button class="qwerty-key" data-lower="-">-</button>
        <button class="qwerty-key" data-lower="+">+</button>
        <button class="qwerty-key" data-lower="=">=</button>
        <button class="qwerty-wide qwerty-action" data-action="backspace">
          <img data-instrument-asset="UI_icons/backspace.svg" class="mx-auto h-6 w-6" />
        </button>
      </div>
      <div class="qwerty-row qwerty-row-center">
        <button class="qwerty-key" data-lower="/">/</button>
        <button class="qwerty-key" data-lower=":">:</button>
        <button class="qwerty-key" data-lower=";">;</button>
        <button class="qwerty-key" data-lower="(">(</button>
        <button class="qwerty-key" data-lower=")">)</button>
        <button class="qwerty-key" data-lower="_">_</button>
        <button class="qwerty-key" data-lower="'">'</button>
        <button class="qwerty-key" data-lower='"'>"</button>
      </div>
    </div>

    <!-- Bottom row (always visible) -->
    <div class="qwerty-row qwerty-row-bottom">
      <button class="qwerty-wide qwerty-action" id="qwerty-layer-toggle" data-action="layer-toggle">
        ?123
      </button>
      <button class="qwerty-key" data-lower=",">,</button>
      <button class="qwerty-space" data-lower=" ">space</button>
      <button class="qwerty-key" data-lower=".">.</button>
      <button class="qwerty-wide qwerty-action qwerty-enter" data-action="enter">
        ↵
      </button>
    </div>
  </div>
